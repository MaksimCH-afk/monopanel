# ============================================================================
#  supervisord.conf — держит 6 приложений + дашборд (Caddy) в одном контейнере.
#  Логи каждого процесса идут в stdout/stderr контейнера с префиксом [program:*].
#      docker logs -f panel
# ============================================================================

[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/run/supervisord.pid

[unix_http_server]
file=/run/supervisor.sock

[supervisorctl]
serverurl=unix:///run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

# Общие настройки для всех программ:
#   autorestart=true — упавший процесс перезапускается
#   логи в stdout/stderr (видны через docker logs)

# --- Дашборд (плитки) :333 — Caddy, статика ---
[program:dashboard]
command=/usr/local/bin/caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# --- cf :3331 — PHP 8.1 + Apache (Cloudflare Panel) ---
[program:cf]
command=apache2ctl -D FOREGROUND
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# --- seo :3332 — Next.js (фронт) ---
[program:seo]
directory=/srv/panel/apps/seo
command=npm run start -- -p 3332
autostart=true
autorestart=true
environment=NODE_ENV="production",PORT="3332"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# --- seo-flask :5001 — внутренний бэкенд seo (наружу не публикуется) ---
[program:seo-flask]
directory=/srv/panel/apps/seo
command=/venv/seo/bin/python -m flask run --host=127.0.0.1 --port=5001
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# --- ank :3333 — FastAPI + uvicorn (генератор анкоров) ---
[program:ank]
directory=/srv/panel/apps/ank
command=/venv/ank/bin/uvicorn main:app --host 0.0.0.0 --port 3333
autostart=true
autorestart=true
environment=ANK_DATA_DIR="/data/ank"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# --- img :3334 — Next.js + Prisma (ImageGen) ---
[program:img]
directory=/srv/panel/apps/img
command=npm run start -- -p 3334
autostart=true
autorestart=true
environment=NODE_ENV="production",PORT="3334"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# --- arc :3335 — FastAPI async (Web Archive Checker) ---
[program:arc]
directory=/srv/panel/apps/arc
command=/venv/arc/bin/uvicorn main:app --host 0.0.0.0 --port 3335
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# --- skins :3336 — Flask + gunicorn (Brandskins, панель на /admin) ---
[program:skins]
directory=/srv/panel/apps/skins
command=/venv/skins/bin/gunicorn -b 0.0.0.0:3336 app:app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
