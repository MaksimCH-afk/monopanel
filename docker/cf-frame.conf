# ============================================================================
#  cf-frame.conf — разрешить встраивание cf (Cloudflare Panel) в iframe дашборда.
#
#  Браузер проверяет заголовки ОТВЕТА самого приложения (cf на :3331), а не
#  дашборда. Поэтому снимаем блокировку фрейминга на стороне Apache cf —
#  это надёжнее лишнего прокси-хопа и сохраняет корневой путь приложения.
#
#  ⚠️ Снятие X-Frame-Options ослабляет защиту от clickjacking. Для локального
#     single-user инструмента это осознанный компромисс. Если cf будет доступен
#     извне — верните ограничение (frame-ancestors с явным списком источников).
# ============================================================================
<IfModule mod_headers.c>
    # Старый заголовок (если cf его выставляет) — убрать.
    Header always unset X-Frame-Options
    # CSP с frame-ancestors имеет приоритет над X-Frame-Options; снимаем и его,
    # чтобы дашборд (host:333) мог встроить cf (host:3331) при любом host/IP.
    Header always unset Content-Security-Policy
</IfModule>
