# ============================================================================
#  Единая панель — один контейнер, 6 приложений + дашборд.
#  Первая сборка долгая: 3 рантайма (PHP/Node/Python) + 2 Next-сборки + Prisma.
#      docker compose up --build
#  Дашборд: http://localhost:333
# ============================================================================

services:
  panel:
    build:
      context: .
      dockerfile: Dockerfile
    image: monopanel:latest
    container_name: panel
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Дашборд (плитки). 333 — привилегированный порт; если демон откажет —
      # поменяйте на 3330 здесь и в dashboard/Caddyfile.
      - "333:333"
      - "3331:3331"   # cf    — Cloudflare Panel
      - "3332:3332"   # seo   — Next.js фронт
      - "3333:3333"   # ank   — генератор анкоров
      - "3334:3334"   # img   — ImageGen
      - "3335:3335"   # arc   — Web Archive Checker
      - "3336:3336"   # skins — Brandskins (/admin)
      # seo-фронт обращается к бэкенду по http://localhost:5001 ИЗ БРАУЗЕРА,
      # поэтому 5001 приходится публиковать (в отличие от первоначального плана).
      - "5001:5001"   # seo   — Flask-бэкенд
    volumes:
      # Постоянные данные (папка ./data в .gitignore — секреты не идут в git).
      - ./data/cf:/data/cf     # cf-БД (токены Cloudflare) + credentials.txt
      - ./data/ank:/data/ank   # ank-БД (проекты, стратегии)
      - ./data/arc:/data/arc   # arc-БД (прогоны) — стартует с чистого листа
      - ./data/img:/data/img   # img: SQLite + сгенерированные картинки
