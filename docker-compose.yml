# ============================================================================
#  Единая панель — один контейнер, 7 приложений + дашборд.
#  Первая сборка долгая: 3 рантайма (PHP/Node/Python) + 2 Next-сборки + Prisma.
#      docker compose up --build
#  Дашборд: http://localhost:333
# ============================================================================

services:
  panel:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Адрес seo-бэкенда для браузера. NEXT_PUBLIC_* «запекается» в бандл при
        # сборке, поэтому это build-arg, а не runtime-env. По умолчанию
        # localhost:5001; переопределяется через .env (NEXT_PUBLIC_SEO_API_URL).
        NEXT_PUBLIC_SEO_API_URL: ${NEXT_PUBLIC_SEO_API_URL:-http://localhost:5001}
    image: monopanel:latest
    container_name: panel
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Redis для seo-бэкенда (кэш/очереди). Хост `redis` — имя сервиса ниже.
      - REDIS_URL=redis://redis:6379/0
      # Уровень логов seo-бэкенда (INFO по умолчанию; DEBUG — максимально подробно).
      - SEO_LOG_LEVEL=${SEO_LOG_LEVEL:-INFO}
    depends_on:
      - redis
    ports:
      # Дашборд (плитки). 333 — привилегированный порт; если демон откажет —
      # поменяйте на 3330 здесь и в dashboard/Caddyfile.
      - "333:333"
      - "3331:3331"   # cf    — Cloudflare Panel
      - "3332:3332"   # seo   — Next.js фронт
      - "3333:3333"   # ank   — генератор анкоров
      - "3334:3334"   # img   — ImageGen
      - "3335:3335"   # arc   — Web Archive Checker
      - "3336:3336"   # skins — Brandskins (/admin)
      - "3337:3337"   # content — Content Gap Analyzer (сущности + интент)
      # seo-фронт обращается к бэкенду по http://localhost:5001 ИЗ БРАУЗЕРА,
      # поэтому 5001 приходится публиковать (в отличие от первоначального плана).
      - "5001:5001"   # seo   — Flask-бэкенд
    volumes:
      # Постоянные данные (папка ./data в .gitignore — секреты не идут в git).
      - ./data/cf:/data/cf     # cf-БД (токены Cloudflare) + credentials.txt
      - ./data/ank:/data/ank   # ank-БД (проекты, стратегии)
      - ./data/arc:/data/arc   # arc-БД (прогоны) — стартует с чистого листа
      - ./data/img:/data/img   # img: SQLite + сгенерированные картинки
      - ./data/seo:/data/seo   # seo: client_secret.json + OAuth-токен GSC + seo.db + logs

  # Redis — кэш и очереди для seo-бэкенда (ускорение под нагрузкой).
  redis:
    image: redis:7-alpine
    container_name: panel-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data   # AOF-персистентность кэша
