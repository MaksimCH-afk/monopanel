<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Единая панель</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
  <link rel="stylesheet" href="/css/themes.css" />
</head>
<body>
  <!-- ===== Топбар ===== -->
  <header class="topbar">
    <a href="#" class="topbar__logo" onclick="openApp('home');return false;">
      <span class="topbar__logo-mark">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </span>
      <span>Единая панель</span>
    </a>
    <span class="topbar__sub" id="hostlabel"></span>

    <!-- Вкладки — в одной строке с логотипом -->
    <nav class="tabs" id="tabs"></nav>

    <div class="topbar__actions">
      <a class="btn btn--ghost btn--sm" id="popout" target="_blank" rel="noopener" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        в новой вкладке
      </a>
      <div class="theme-picker" id="themePicker">
        <button type="button" class="theme-picker__btn" id="themePickerBtn" aria-haspopup="listbox" aria-expanded="false">
          <span class="theme-picker__swatch" id="themePickerSwatch" style="background:#2358e0"></span>
          <span id="themePickerLabel">стандарт</span>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="theme-picker__menu" id="themePickerMenu" role="listbox" style="display:none"></div>
      </div>
    </div>
  </header>

  <!-- ===== Контент ===== -->
  <main class="content" id="content"></main>

  <script>
    // ---- Приложения. embed=false → только новая вкладка (Auth0/блокировка iframe). ----
    const APPS = [
      { key: "cf",    name: "Cloudflare Panel",  icon: "CF", port: 3331, path: "/",      embed: true,  desc: "Домены, SSL, DNS, токены Cloudflare." },
      { key: "seo",   name: "SEO Dashboard",     icon: "SE", port: 3332, path: "/",      embed: false, desc: "GSC / SEO. Вход через Auth0 — только в новой вкладке." },
      { key: "ank",   name: "Генератор анкоров", icon: "AN", port: 3333, path: "/",      embed: true,  desc: "Анкоры (HubNero): проекты, стратегии." },
      { key: "img",   name: "ImageGen",          icon: "IM", port: 3334, path: "/",      embed: true,  desc: "Мультимодельная генерация изображений." },
      { key: "arc",   name: "Web Archive",       icon: "AR", port: 3335, path: "/",      embed: true,  desc: "Прогоны доменов по веб-архиву." },
      { key: "skins", name: "Brandskins",        icon: "SK", port: 3336, path: "/admin", embed: true,  desc: "Шаблоны и темы брендов (панель /admin)." },
    ];

    const host  = location.hostname;
    const proto = location.protocol;
    const urlFor = (app) => `${proto}//${host}:${app.port}${app.path}`;
    document.getElementById("hostlabel").textContent = host;

    const tabsEl    = document.getElementById("tabs");
    const contentEl = document.getElementById("content");
    const popoutEl  = document.getElementById("popout");

    const frames = {};   // key -> iframe (ленивое создание, переживает переключение)

    // ---- Вкладки ----
    function makeTab(key, label, external) {
      const b = document.createElement("button");
      b.className = "tab"; b.dataset.key = key;
      b.innerHTML = label + (external ? ' <span class="ext">↗</span>' : "");
      b.onclick = () => openApp(key);
      tabsEl.appendChild(b);
    }
    makeTab("home", "Дашборд", false);
    APPS.forEach(a => makeTab(a.key, a.name, !a.embed));

    // ---- Домашний экран с плитками ----
    const home = document.createElement("div");
    home.className = "pane home active";
    home.innerHTML = `
      <div class="home__head">
        <div class="section-title">Рабочее пространство</div>
        <p class="home__lead">Вкладка открывает приложение прямо здесь. Кнопка ↗ — в отдельной вкладке браузера.</p>
      </div>
      <div class="grid" id="grid"></div>`;
    contentEl.appendChild(home);

    const grid = home.querySelector("#grid");
    APPS.forEach(app => {
      const tile = document.createElement("div");
      tile.className = "tile";
      tile.onclick = () => openApp(app.key);
      tile.innerHTML = `
        <button class="tile__popout" title="Открыть в новой вкладке" aria-label="Открыть в новой вкладке">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </button>
        <div class="tile__head">
          <div class="tile__ico">${app.icon}</div>
          <div class="tile__title">${app.name}</div>
        </div>
        <div class="tile__body">
          <div class="tile__desc">${app.desc}</div>
          <div class="tile__meta">
            <span class="tile__port">:${app.port}${app.path}</span>
            <span class="badge ${app.embed ? "badge--accent" : "badge--neutral"}">${app.embed ? "встраивается" : "новая вкладка"}</span>
          </div>
        </div>`;
      tile.querySelector(".tile__popout").onclick = (e) => { e.stopPropagation(); openExternal(app); };
      grid.appendChild(tile);
    });

    // ---- Переключение ----
    const setActiveTab = (key) => [...tabsEl.children].forEach(t => t.classList.toggle("active", t.dataset.key === key));
    const showPane = (el) => {
      [...contentEl.children].forEach(p => { p.classList.remove("active"); p.style.display = "none"; });
      el.classList.add("active"); el.style.display = "block";
    };
    const updatePopout = (app) => { if (app) { popoutEl.style.display = "inline-flex"; popoutEl.href = urlFor(app); } else popoutEl.style.display = "none"; };
    const openExternal = (app) => window.open(urlFor(app), "_blank", "noopener");

    function openApp(key) {
      if (key === "home") { setActiveTab("home"); showPane(home); updatePopout(null); return; }
      const app = APPS.find(a => a.key === key);
      if (!app.embed) { openExternal(app); showNotice(app); return; }
      if (!frames[key]) {
        const f = document.createElement("iframe");
        f.src = urlFor(app); f.className = "pane";
        contentEl.appendChild(f); frames[key] = f;
      }
      setActiveTab(key); showPane(frames[key]); updatePopout(app);
    }

    // ---- Пояснение для new-tab-only ----
    let noticePane;
    function showNotice(app) {
      if (!noticePane) { noticePane = document.createElement("div"); noticePane.className = "pane notice"; contentEl.appendChild(noticePane); }
      noticePane.innerHTML = `
        <div class="notice__box">
          <h2>${app.name} открывается в отдельной вкладке</h2>
          <p>${app.desc}<br><br>Это приложение блокирует встраивание в iframe
          (вход через сторонний домен Auth0 и сторонние куки внутри iframe не работают),
          поэтому оно открывается полноценно в новой вкладке браузера.</p>
          <button class="btn btn--primary" id="reopen">↗ Открыть снова</button>
        </div>`;
      noticePane.querySelector("#reopen").onclick = () => openExternal(app);
      setActiveTab(app.key); showPane(noticePane); updatePopout(app);
    }

    // ---- Theme picker (перенесён из webarhive) ----
    (function () {
      const THEMES = [
        { id: "",      name: "стандарт", sub: "светлый сине-серый",     swatches: ["#dde3ee","#2358e0","#e3f5ec"] },
        { id: "linen", name: "лён",      sub: "почти ч/б, мониторинг",  swatches: ["#efefef","#161616","#d8ecdf"] },
        { id: "nord",  name: "nord",     sub: "холодный скандинавский", swatches: ["#e3e7ee","#5e81ac","#dfeadc"] },
        { id: "slate", name: "сланец",   sub: "серо-бирюзовый",         swatches: ["#dde3e8","#00838f","#d8e9d9"] },
        { id: "ocean", name: "океан",    sub: "тёмная морская",         swatches: ["#0c1820","#2ec4b6","#172a37"] },
      ];
      const KEY = "monopanel-theme";
      let saved = "";
      try { saved = localStorage.getItem(KEY) || ""; } catch (e) {}
      if (saved && !THEMES.some(t => t.id === saved)) { saved = ""; try { localStorage.removeItem(KEY); } catch (e) {} }

      const swEl = document.getElementById("themePickerSwatch");
      const lblEl = document.getElementById("themePickerLabel");
      const menu = document.getElementById("themePickerMenu");
      const btn  = document.getElementById("themePickerBtn");

      function apply(id) {
        if (id) document.body.setAttribute("data-theme", id);
        else document.body.removeAttribute("data-theme");
        const def = THEMES.find(t => t.id === id) || THEMES[0];
        swEl.style.background = def.swatches[1];
        lblEl.textContent = def.name;
        try { localStorage.setItem(KEY, id); } catch (e) {}
      }
      apply(saved);

      THEMES.forEach(t => {
        const opt = document.createElement("button");
        opt.type = "button";
        opt.className = "theme-opt" + (t.id === saved ? " theme-opt--active" : "");
        opt.dataset.id = t.id;
        opt.innerHTML =
          '<span class="theme-opt__swatches">' +
            `<span style="background:${t.swatches[0]}"></span>` +
            `<span style="background:${t.swatches[1]}"></span>` +
            `<span style="background:${t.swatches[2]}"></span>` +
          '</span>' +
          '<span style="display:flex;flex-direction:column;flex:1;min-width:0">' +
            `<span class="theme-opt__name">${t.name}</span>` +
            `<span class="theme-opt__sub">${t.sub}</span>` +
          '</span>';
        opt.onclick = () => {
          apply(t.id);
          menu.querySelectorAll(".theme-opt").forEach(o => o.classList.toggle("theme-opt--active", o.dataset.id === t.id));
          menu.style.display = "none"; btn.setAttribute("aria-expanded", "false");
        };
        menu.appendChild(opt);
      });
      btn.onclick = (ev) => {
        ev.stopPropagation();
        const open = menu.style.display !== "none";
        menu.style.display = open ? "none" : "grid";
        btn.setAttribute("aria-expanded", open ? "false" : "true");
      };
      document.addEventListener("click", (ev) => {
        if (!document.getElementById("themePicker").contains(ev.target)) { menu.style.display = "none"; btn.setAttribute("aria-expanded", "false"); }
      });
    })();
  </script>
</body>
</html>
