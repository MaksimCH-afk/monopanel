<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Единая панель</title>
  <style>
    :root {
      --bg: #0e1117;
      --card: #161b22;
      --card-hover: #1f2630;
      --border: #283040;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px 24px;
    }
    header {
      max-width: 1000px;
      margin: 0 auto 40px;
      text-align: center;
    }
    header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    header p { color: var(--muted); margin-top: 8px; font-size: 15px; }
    .grid {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }
    .tile {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: background .15s ease, transform .15s ease, border-color .15s ease;
    }
    .tile:hover {
      background: var(--card-hover);
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .tile .top { display: flex; align-items: center; gap: 12px; }
    .tile .ico {
      width: 42px; height: 42px;
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 20px; font-weight: 700;
      background: #21262d;
    }
    .tile h2 { font-size: 17px; font-weight: 600; }
    .tile .desc { color: var(--muted); font-size: 13px; line-height: 1.5; }
    .tile .port {
      margin-top: auto;
      font-size: 12px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    footer {
      max-width: 1000px;
      margin: 40px auto 0;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Единая панель</h1>
    <p>6 приложений в одном контейнере. Плитка открывает приложение на своём порту.</p>
  </header>

  <main class="grid" id="grid"></main>

  <footer>
    Хост определяется автоматически — работает и по <code>localhost</code>, и по IP.
  </footer>

  <script>
    // Плитки. Каждое приложение реально слушает свой порт.
    const APPS = [
      { key: "cf",    name: "Cloudflare Panel", icon: "CF", port: 3331, path: "/",      desc: "Домены, SSL, DNS, токены Cloudflare." },
      { key: "seo",   name: "SEO Dashboard",    icon: "SE", port: 3332, path: "/",      desc: "Google Search Console / SEO-метрики." },
      { key: "ank",   name: "Генератор анкоров",icon: "AN", port: 3333, path: "/",      desc: "Анкоры (HubNero): проекты, стратегии." },
      { key: "img",   name: "ImageGen",         icon: "IM", port: 3334, path: "/",      desc: "Мультимодельная генерация изображений." },
      { key: "arc",   name: "Web Archive",      icon: "AR", port: 3335, path: "/",      desc: "Прогоны доменов по веб-архиву." },
      { key: "skins", name: "Brandskins",       icon: "SK", port: 3336, path: "/admin", desc: "Шаблоны и темы брендов (панель /admin)." },
    ];

    // Хост берём из адресной строки (localhost / IP / поддомен).
    const host = location.hostname;
    const proto = location.protocol;

    const grid = document.getElementById("grid");
    for (const app of APPS) {
      const url = `${proto}//${host}:${app.port}${app.path}`;
      const a = document.createElement("a");
      a.className = "tile";
      a.href = url;
      a.target = "_blank";
      a.rel = "noopener";
      a.innerHTML = `
        <div class="top">
          <div class="ico">${app.icon}</div>
          <h2>${app.name}</h2>
        </div>
        <div class="desc">${app.desc}</div>
        <div class="port">${host}:${app.port}${app.path}</div>
      `;
      grid.appendChild(a);
    }
  </script>
</body>
</html>
